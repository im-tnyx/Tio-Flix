name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Create CI local properties
        run: |
          cat > local.properties <<'EOF'
          SUPABASE_URL=https://example.supabase.co
          SUPABASE_PUBLISHABLE_KEY=sb_publishable_ci_placeholder
          GOOGLE_WEB_CLIENT_ID=ci-placeholder.apps.googleusercontent.com
          EOF

      - name: Compile debug sources
        run: gradle :app:compileDebugKotlin --stacktrace

      - name: Run unit tests
        run: gradle :app:testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tio-flix-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
